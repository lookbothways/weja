<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>weja</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #ffffff; --text: #333; --border: #eeeeee; 
            --ghost: rgba(0, 0, 0, 0.2); 
            --player-dot: #add8e6; 
            --status-red: #ff5f57; --status-green: #28c840; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; padding: 20px; font-family: 'Roboto', sans-serif; 
            background: var(--bg); color: var(--text); display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; touch-action: none; 
        }
        
        #status-bar { position: fixed; top: 15px; left: 15px; display: flex; gap: 6px; z-index: 100; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #eee; }

        #container { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; }

        #history {
            width: 100%; height: 100px; display: flex; flex-direction: column;
            justify-content: flex-end; margin-bottom: 5px;
            mask-image: linear-gradient(to top, black 70%, transparent 100%);
        }
        .msg { color: #bbb; font-size: 1.2rem; font-weight: 300; text-align: center; margin: 2px 0; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #display { 
            width: 100%; min-height: 60px; padding: 10px; font-size: 1.8rem; font-weight: 300; 
            border: 1px solid #ddd; border-radius: 15px; text-align: center; letter-spacing: 1px; 
            display: flex; align-items: center; justify-content: center; background: white; margin-bottom: 30px;
            z-index: 10;
        }

        #play-area {
            width: 100%; max-width: 800px;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 14px;
            background: rgba(255,255,255,0.4);
        }

        #keyboard { 
            display: grid; grid-template-columns: repeat(20, 1fr); gap: 6px; 
            width: 100%; user-select: none; z-index: 10;
        }
        .key { grid-column: span 2; height: 50px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.9); border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; cursor: pointer; }
        .key.wide { grid-column: span 12; }
        .key.gray { grid-column: span 3; background: #fafafa; color: #aaa; font-size: 0.75rem; letter-spacing: 1px; }
        .spacer { grid-column: span 1; }

        #tally { margin-top: 40px; font-weight: 100; font-size: 1.2rem; color: #eee; letter-spacing: 2px; }

        #ghost-cursor { 
            position: fixed; left: 50%; top: 50%; width: 32px; height: 32px; 
            background: var(--ghost); border: 1.5px solid #222; border-radius: 50%; 
            pointer-events: none; transform: translate(-50%, -50%); z-index: 9999; 
        }

        .player-dot {
            position: fixed; width: 6px; height: 6px; 
            background: var(--player-dot); border-radius: 50%; 
            pointer-events: none; transform: translate(-50%, -50%);
            z-index: 5000; transition: transform 0.1s linear;
        }
    </style>
</head>
<body>

    <div id="status-bar">
        <div id="dot-net" class="dot"></div>
        <div id="dot-local" class="dot"></div>
    </div>

    <div id="container">
        <div id="history"></div>
        <div id="display"></div>
    </div>

    <div id="play-area">
        <div id="keyboard">
            <div class="key">1</div><div class="key">2</div><div class="key">3</div><div class="key">4</div><div class="key">5</div><div class="key">6</div><div class="key">7</div><div class="key">8</div><div class="key">9</div><div class="key">0</div>
            <div class="key">Q</div><div class="key">W</div><div class="key">E</div><div class="key">R</div><div class="key">T</div><div class="key">Y</div><div class="key">U</div><div class="key">I</div><div class="key">O</div><div class="key">P</div>
            <div class="spacer"></div><div class="key">A</div><div class="key">S</div><div class="key">D</div><div class="key">F</div><div class="key">G</div><div class="key">H</div><div class="key">J</div><div class="key">K</div><div class="key">L</div><div class="spacer"></div>
            <div class="key gray">DEL</div><div class="key">Z</div><div class="key">X</div><div class="key">C</div><div class="key">V</div><div class="key">B</div><div class="key">N</div><div class="key">M</div><div class="key gray">SEND</div>
            <div class="spacer"></div><div class="spacer"></div><div class="spacer"></div><div class="key wide">SPACE</div>
        </div>
    </div>

    <div id="tally">0</div>
    <div id="ghost-cursor"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDefyd7IEcb08AEVU1x3yi_U7H1BwVC_sg",
          authDomain: "wejaaaaaa.firebaseapp.com",
          databaseURL: "https://wejaaaaaa-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "wejaaaaaa",
          storageBucket: "wejaaaaaa.firebasestorage.app",
          messagingSenderId: "806504806929",
          appId: "1:806504806929:web:0d44b73feb96fc66ce0fb0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = Math.random().toString(36).substr(2, 9);
        const joinedAt = Date.now();
        
        const playerRef = db.ref('players/' + myId);
        const textRef = db.ref('sharedText');
        const playersRef = db.ref('players');
        const historyRef = db.ref('history');

        const display = document.getElementById('display');
        const historyEl = document.getElementById('history');
        const tallyEl = document.getElementById('tally');
        const ghost = document.getElementById('ghost-cursor');
        const dotNet = document.getElementById('dot-net');
        const dotLocal = document.getElementById('dot-local');
        const playArea = document.getElementById('play-area');

        let allPlayers = {};
        let playerDots = {};
        let sharedText = "";

        db.ref(".info/connected").on("value", (snap) => {
            dotNet.style.background = snap.val() ? 'var(--status-green)' : 'var(--status-red)';
        });
        playerRef.onDisconnect().remove();

        // --- Coordinate system: normalized against the play-area box ---
        function getPlayRect() { return playArea.getBoundingClientRect(); }

        // Convert client (viewport) coords -> normalized [0,1] within play area.
        // Returns null if outside the box, so off-box motion isn't sent.
        function toNorm(clientX, clientY) {
            const r = getPlayRect();
            const nx = (clientX - r.left) / r.width;
            const ny = (clientY - r.top) / r.height;
            if (nx < 0 || nx > 1 || ny < 0 || ny > 1) return null;
            return { x: nx, y: ny };
        }

        // Convert normalized -> client (viewport) coords on this device.
        function fromNorm(nx, ny) {
            const r = getPlayRect();
            return { x: r.left + nx * r.width, y: r.top + ny * r.height };
        }

        function sendPos(clientX, clientY) {
            const n = toNorm(clientX, clientY);
            if (!n) return;
            playerRef.set({ x: n.x, y: n.y, lastSeen: Date.now(), joinedAt: joinedAt });
            dotLocal.style.background = 'var(--status-green)';
        }

        window.addEventListener('mousemove', (e) => sendPos(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => {
            if (e.touches[0]) sendPos(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        textRef.on('value', (snap) => { sharedText = snap.val() || ""; display.innerText = sharedText; });
        historyRef.limitToLast(10).on('value', (snap) => {
            historyEl.innerHTML = "";
            snap.forEach((child) => {
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerText = child.val();
                historyEl.appendChild(div);
            });
        });

        playersRef.on('value', (snap) => { allPlayers = snap.val() || {}; });

        function animate() {
            const now = Date.now();
            const activePlayers = Object.keys(allPlayers)
                .map(id => ({ id, ...allPlayers[id] }))
                .filter(p => now - p.lastSeen < 6000)
                .sort((a, b) => a.joinedAt - b.joinedAt);

            tallyEl.innerText = activePlayers.length;

            activePlayers.forEach(p => {
                if (!playerDots[p.id]) {
                    const dot = document.createElement('div');
                    dot.className = 'player-dot';
                    document.body.appendChild(dot);
                    playerDots[p.id] = dot;
                }
                const c = fromNorm(p.x, p.y);
                playerDots[p.id].style.left = c.x + 'px';
                playerDots[p.id].style.top = c.y + 'px';
            });

            Object.keys(playerDots).forEach(id => {
                if (!activePlayers.find(p => p.id === id)) {
                    playerDots[id].remove();
                    delete playerDots[id];
                }
            });

            const count = activePlayers.length;
            if (count > 0) {
                const orbitTime = 6660; 
                const t = (now % orbitTime) / orbitTime; // 0.0 to 1.0 linear
                
                // MATH: The "Dwell" function.
                // We use a sine wave to slow down the focus near integers.
                // focus = raw - k*sin(raw) makes the derivative small at integers.
                const rawFocus = t * count;
                const focus = rawFocus - (1.0 / (2 * Math.PI)) * Math.sin(2 * Math.PI * rawFocus);

                let sumX = 0, sumY = 0, sumWeight = 0;

                activePlayers.forEach((p, i) => {
                    let dist = Math.abs(i - focus);
                    if (dist > count / 2) dist = Math.abs(dist - count);
                    
                    // Gaussian Weight: Tightened sigma to 0.28 for more "hover" snap
                    const weight = Math.exp(-(dist * dist) / (2 * 0.28 * 0.28));
                    sumX += p.x * weight;
                    sumY += p.y * weight;
                    sumWeight += weight;
                });

                // Weighted average is in normalized play-area space — convert to client coords.
                const target = fromNorm(sumX / sumWeight, sumY / sumWeight);
                const currentX = parseFloat(ghost.style.left) || target.x;
                const currentY = parseFloat(ghost.style.top) || target.y;
                
                // Interpolation (0.1) for a slightly heavy, physical feel
                ghost.style.left = (currentX + (target.x - currentX) * 0.1) + 'px';
                ghost.style.top = (currentY + (target.y - currentY) * 0.1) + 'px';
            }
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        function tryType(e) {
            const rect = ghost.getBoundingClientRect();
            const el = document.elementFromPoint(rect.left + 16, rect.top + 16);
            
            if (el && el.classList.contains('key')) {
                if(e) e.preventDefault();
                let char = el.innerText;
                if (char === 'SEND') {
                    if (sharedText.trim().length > 0) {
                        historyRef.push(sharedText);
                        textRef.set("");
                    }
                } else if (char === 'DEL') {
                    textRef.set(sharedText.slice(0, -1));
                } else {
                    let nextText = sharedText;
                    if (char === 'SPACE') nextText += ' ';
                    else nextText += char;
                    textRef.set(nextText.slice(-24));
                }
            }
        }

        window.addEventListener('mousedown', tryType);
        window.addEventListener('touchstart', (e) => {
            if (e.touches[0]) {
                sendPos(e.touches[0].clientX, e.touches[0].clientY);
                tryType(e);
            }
        }, { passive: false });
    </script>
</body>
</html>
