<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>weja</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff; --text: #333; --border: #eeeeee;
            --status-red: #ff5f57; --status-green: #28c840;
            --highlight: #ff3b30;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg); color: var(--text); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            touch-action: none;
        }

        #status-bar { position: fixed; top: 8px; left: 8px; display: flex; gap: 6px; z-index: 100; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #eee; }

        /* Landscape layout: top strip has history+display, rest is compass */
        #top-strip {
            width: 100%; display: flex; align-items: center; justify-content: center;
            gap: 12px; padding: 4px 20px; flex-shrink: 0;
        }
        #history {
            flex: 1; max-width: 300px; height: 32px; display: flex; flex-direction: column;
            justify-content: flex-end; overflow: hidden;
            mask-image: linear-gradient(to top, black 70%, transparent 100%);
        }
        .msg { color: #bbb; font-size: 0.85rem; font-weight: 300; text-align: center; margin: 1px 0; animation: slideUp 0.2s ease-out; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        #display {
            min-width: 180px; max-width: 320px; height: 32px; padding: 2px 12px;
            font-size: 1.1rem; font-weight: 300;
            border: 1px solid #ddd; border-radius: 10px; text-align: center; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: center; background: white;
        }

        #compass-stage {
            flex: 1; width: 100%;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        #compass-svg { width: 100%; height: 100%; display: block; user-select: none; touch-action: none; }

        .arc-letter {
            font-family: 'Roboto', sans-serif; font-weight: 300; font-size: 24px;
            fill: #555; user-select: none;
            transition: font-size 0.15s ease, font-weight 0.15s ease, fill 0.15s ease;
        }
        .arc-letter.special { fill: #aaa; font-size: 15px; letter-spacing: 1px; }
        .arc-letter.highlighted { fill: var(--highlight); font-weight: 700; font-size: 64px; }
        .arc-letter.special.highlighted { fill: var(--highlight); font-weight: 700; font-size: 42px; }
        .arc-divider { stroke: var(--border); stroke-width: 1; fill: none; }
        .arc-bg { fill: rgba(255,255,255,0.4); stroke: var(--border); stroke-width: 1; }
        .band-bg { fill: #f4f4f4; stroke: none; }
        .band-text { font-family: 'Roboto', sans-serif; font-weight: 300; font-size: 11px; fill: #bbb; letter-spacing: 2px; }

        #compass-handle { cursor: grab; }
        #compass-handle.dragging { cursor: grabbing; }
        #compass-handle .body { fill: rgba(255,255,255,0.95); stroke: #222; stroke-width: 1.5; }
        #compass-handle .tip-line { stroke: #222; stroke-width: 1.5; fill: none; }

        #tally { position: fixed; bottom: 6px; right: 12px; font-weight: 100; font-size: 0.9rem; color: #ddd; letter-spacing: 2px; }

        /* Rotate prompt for portrait mobile */
        #rotate-prompt {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: #fff; color: #333;
            flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Roboto', sans-serif; text-align: center; padding: 40px;
        }
        #rotate-prompt .icon { font-size: 3rem; margin-bottom: 16px; }
        #rotate-prompt .txt { font-size: 1.1rem; font-weight: 300; color: #888; }

        @media (orientation: portrait) and (max-width: 900px) {
            #rotate-prompt { display: flex !important; }
            #top-strip, #compass-stage, #tally, #status-bar { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="rotate-prompt">
        <div class="icon">📱↔️</div>
        <div class="txt">Rotate your phone to landscape</div>
    </div>

    <div id="status-bar">
        <div id="dot-net" class="dot"></div>
        <div id="dot-local" class="dot"></div>
    </div>

    <div id="top-strip">
        <div id="history"></div>
        <div id="display"></div>
    </div>

    <div id="compass-stage">
        <svg id="compass-svg" viewBox="0 0 960 420" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div id="tally">0</div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // ===== Orientation lock attempt =====
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }

        // ===== Firebase =====
        const firebaseConfig = {
          apiKey: "AIzaSyDefyd7IEcb08AEVU1x3yi_U7H1BwVC_sg",
          authDomain: "wejaaaaaa.firebaseapp.com",
          databaseURL: "https://wejaaaaaa-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "wejaaaaaa",
          storageBucket: "wejaaaaaa.firebasestorage.app",
          messagingSenderId: "806504806929",
          appId: "1:806504806929:web:0d44b73feb96fc66ce0fb0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = Math.random().toString(36).substr(2, 9);
        const joinedAt = Date.now();
        const playerRef = db.ref('players/' + myId);
        const textRef = db.ref('sharedText');
        const playersRef = db.ref('players');
        const historyRef = db.ref('history');

        const display = document.getElementById('display');
        const historyEl = document.getElementById('history');
        const tallyEl = document.getElementById('tally');
        const dotNet = document.getElementById('dot-net');
        const dotLocal = document.getElementById('dot-local');
        const svg = document.getElementById('compass-svg');

        let allPlayers = {};
        let sharedText = "";

        db.ref(".info/connected").on("value", (snap) => {
            dotNet.style.background = snap.val() ? 'var(--status-green)' : 'var(--status-red)';
        });

        function prune() {
            const cutoff = Date.now() - 3600000;
            playersRef.once('value', (snap) => {
                snap.forEach(child => {
                    const p = child.val();
                    if (!p || !p.lastSeen || p.lastSeen < cutoff) {
                        child.ref.remove();
                    }
                });
            });
        }
        prune();
        setInterval(prune, 300000);
        playerRef.onDisconnect().remove();

        textRef.on('value', (snap) => { sharedText = snap.val() || ""; display.innerText = sharedText; });
        historyRef.limitToLast(10).on('value', (snap) => {
            historyEl.innerHTML = "";
            snap.forEach((child) => {
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerText = child.val();
                historyEl.appendChild(div);
            });
        });
        playersRef.on('value', (snap) => { allPlayers = snap.val() || {}; });

        // ===== Compass geometry =====
        // Wider viewBox for 16:9 landscape
        const VB_W = 960, VB_H = 420;
        const PIVOT = { x: 480, y: 400 };

        const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        const ROW1 = ['A','B','C','D','E','F','G','H','I','J','K','L','DEL'];
        // NO GAPS — inner row is packed tight just like outer
        const ROW2 = 'NOPQRSTUVWXYZ'.split('');
        ROW2.push('SEND', 'SPACE');

        const ANG_START = -160;
        const ANG_END   = -20;
        const ANG_SPAN  = ANG_END - ANG_START;

        // Bigger radii for landscape
        const R_OUTER_OUT = 380;
        const R_OUTER_IN  = 310;
        const R_INNER_OUT = 300;
        const R_INNER_IN  = 230;

        // Instruction band radii (mobile only, drawn for all)
        const R_BAND_OUTER_OUT = R_OUTER_OUT + 30;
        const R_BAND_OUTER_IN  = R_OUTER_OUT + 2;
        const R_BAND_INNER_OUT = R_INNER_IN - 2;
        const R_BAND_INNER_IN  = R_INNER_IN - 30;

        function deg2rad(d) { return d * Math.PI / 180; }
        function polar(cx, cy, r, deg) {
            const a = deg2rad(deg);
            return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
        }
        function arcPath(cx, cy, rOut, rIn, a0, a1) {
            const p0 = polar(cx, cy, rOut, a0);
            const p1 = polar(cx, cy, rOut, a1);
            const p2 = polar(cx, cy, rIn,  a1);
            const p3 = polar(cx, cy, rIn,  a0);
            const large = Math.abs(a1 - a0) > 180 ? 1 : 0;
            return `M ${p0.x} ${p0.y} A ${rOut} ${rOut} 0 ${large} 1 ${p1.x} ${p1.y} L ${p2.x} ${p2.y} A ${rIn} ${rIn} 0 ${large} 0 ${p3.x} ${p3.y} Z`;
        }

        // ===== Draw instruction bands (mobile-only visual, harmless on desktop) =====
        if (isMobile) {
            // Top band: "DRAG HERE"
            const topBand = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            topBand.setAttribute('d', arcPath(PIVOT.x, PIVOT.y, R_BAND_OUTER_OUT, R_BAND_OUTER_IN, ANG_START, ANG_END));
            topBand.setAttribute('class', 'band-bg');
            svg.appendChild(topBand);

            // Curved text path for "DRAG HERE"
            const topTextR = (R_BAND_OUTER_OUT + R_BAND_OUTER_IN) / 2;
            const topTextPathId = 'topTextPath';
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const topPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            // Arc from left to right at the band's mid-radius
            const tp0 = polar(PIVOT.x, PIVOT.y, topTextR, ANG_START);
            const tp1 = polar(PIVOT.x, PIVOT.y, topTextR, ANG_END);
            topPath.setAttribute('d', `M ${tp0.x} ${tp0.y} A ${topTextR} ${topTextR} 0 0 1 ${tp1.x} ${tp1.y}`);
            topPath.id = topTextPathId;
            defs.appendChild(topPath);

            // Bottom band: "LIFT TO TRANSMIT"
            const botBand = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            botBand.setAttribute('d', arcPath(PIVOT.x, PIVOT.y, R_BAND_INNER_OUT, R_BAND_INNER_IN, ANG_START, ANG_END));
            botBand.setAttribute('class', 'band-bg');
            svg.appendChild(botBand);

            const botTextR = (R_BAND_INNER_OUT + R_BAND_INNER_IN) / 2;
            const botTextPathId = 'botTextPath';
            const botPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            const bp0 = polar(PIVOT.x, PIVOT.y, botTextR, ANG_START);
            const bp1 = polar(PIVOT.x, PIVOT.y, botTextR, ANG_END);
            botPath.setAttribute('d', `M ${bp0.x} ${bp0.y} A ${botTextR} ${botTextR} 0 0 1 ${bp1.x} ${bp1.y}`);
            botPath.id = botTextPathId;
            defs.appendChild(botPath);

            svg.appendChild(defs);

            // Top text
            const topText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            topText.setAttribute('class', 'band-text');
            const topTP = document.createElementNS('http://www.w3.org/2000/svg', 'textPath');
            topTP.setAttribute('href', '#' + topTextPathId);
            topTP.setAttribute('startOffset', '50%');
            topTP.setAttribute('text-anchor', 'middle');
            topTP.textContent = 'DRAG HERE';
            topText.appendChild(topTP);
            svg.appendChild(topText);

            // Bottom text
            const botText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            botText.setAttribute('class', 'band-text');
            const botTP = document.createElementNS('http://www.w3.org/2000/svg', 'textPath');
            botTP.setAttribute('href', '#' + botTextPathId);
            botTP.setAttribute('startOffset', '50%');
            botTP.setAttribute('text-anchor', 'middle');
            botTP.textContent = 'LIFT TO TRANSMIT';
            botText.appendChild(botTP);
            svg.appendChild(botText);
        }

        // ===== Build letter arcs =====
        const segments = [];
        const typeable = [];

        function buildRow(items, rOut, rIn, row) {
            const n = items.length;
            const step = ANG_SPAN / n;
            const labelR = (rOut + rIn) / 2;
            items.forEach((label, i) => {
                const a0 = ANG_START + i * step;
                const a1 = a0 + step;
                const mid = (a0 + a1) / 2;
                const isGap = label === '__GAP__';
                const seg = { label, row, a0, a1, mid, rOut, rIn, isGap };
                if (!isGap) {
                    seg.idx = typeable.length;
                    typeable.push(seg);
                }
                segments.push(seg);

                if (isGap) return;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', arcPath(PIVOT.x, PIVOT.y, rOut, rIn, a0, a1));
                path.setAttribute('class', 'arc-bg');
                path.dataset.label = label;
                svg.appendChild(path);

                const pos = polar(PIVOT.x, PIVOT.y, labelR, mid);
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', pos.x);
                text.setAttribute('y', pos.y);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');
                const rot = mid + 90;
                text.setAttribute('transform', `rotate(${rot} ${pos.x} ${pos.y})`);
                text.setAttribute('class', 'arc-letter' + ((label === 'DEL' || label === 'SEND' || label === 'SPACE') ? ' special' : ''));
                text.textContent = label === 'SPACE' ? '␣' : label;
                text.dataset.label = label;
                text.dataset.idx = seg.idx;
                svg.appendChild(text);
            });
        }

        buildRow(ROW1, R_OUTER_OUT, R_OUTER_IN, 0);
        buildRow(ROW2, R_INNER_OUT, R_INNER_IN, 1);

        // Compass handle
        const HANDLE_R = 22;
        const HANDLE_ORBIT = 90;
        const TIP_LEN_OUTER = R_OUTER_IN - HANDLE_ORBIT - 6;
        const TIP_LEN_INNER = R_INNER_IN - HANDLE_ORBIT - 6;

        const handle = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        handle.id = 'compass-handle';
        const bodyEl = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        bodyEl.setAttribute('r', HANDLE_R);
        bodyEl.setAttribute('class', 'body');
        const tipLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        tipLine.setAttribute('x1', 0); tipLine.setAttribute('y1', 0);
        tipLine.setAttribute('class', 'tip-line');
        const tipDot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        tipDot.setAttribute('r', 3.5);
        tipDot.setAttribute('fill', '#222');
        handle.appendChild(tipLine);
        handle.appendChild(bodyEl);
        handle.appendChild(tipDot);

        let dragKnob = null, dragKnobLabel = null;
        const KNOB_R = 34;
        if (isMobile) {
            dragKnob = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            dragKnob.setAttribute('r', KNOB_R);
            dragKnob.setAttribute('fill', '#111');
            dragKnob.setAttribute('stroke', '#000');
            dragKnob.setAttribute('stroke-width', '1');
            handle.appendChild(dragKnob);
            dragKnobLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            dragKnobLabel.setAttribute('fill', '#fff');
            dragKnobLabel.setAttribute('font-size', '10');
            dragKnobLabel.setAttribute('font-weight', '400');
            dragKnobLabel.setAttribute('letter-spacing', '1.5');
            dragKnobLabel.setAttribute('text-anchor', 'middle');
            dragKnobLabel.setAttribute('dominant-baseline', 'middle');
            dragKnobLabel.textContent = 'DRAG ME';
            handle.appendChild(dragKnobLabel);
        }

        svg.appendChild(handle);

        // ===== State: angle + row =====
        let localAngle = (ANG_START + ANG_END) / 2;
        let localRow = 0;
        let isDragging = false;

        function getHighlightedSegment(angle, row) {
            const clamped = Math.max(ANG_START, Math.min(ANG_END, angle));
            for (const s of segments) {
                if (s.row === row && !s.isGap && clamped >= s.a0 && clamped <= s.a1) return s;
            }
            return null;
        }

        function clientToSvg(clientX, clientY) {
            const pt = svg.createSVGPoint();
            pt.x = clientX; pt.y = clientY;
            return pt.matrixTransform(svg.getScreenCTM().inverse());
        }

        function pointToAngleRow(svgX, svgY) {
            const dx = svgX - PIVOT.x;
            const dy = svgY - PIVOT.y;
            const dist = Math.hypot(dx, dy);
            let ang = Math.atan2(dy, dx) * 180 / Math.PI;
            ang = Math.max(ANG_START, Math.min(ANG_END, ang));
            const rowBoundary = (R_OUTER_IN + R_INNER_OUT) / 2;
            let row = dist >= rowBoundary ? 0 : 1;
            return { ang, row, dist };
        }

        // ===== Broadcast: angle + row =====
        function broadcastLocal() {
            playerRef.set({
                ang: localAngle,
                row: localRow,
                lastSeen: Date.now(),
                joinedAt: joinedAt
            });
            dotLocal.style.background = 'var(--status-green)';
        }

        // ===== Input =====
        function updateFromPoint(clientX, clientY) {
            const p = clientToSvg(clientX, clientY);
            const result = pointToAngleRow(p.x, p.y);
            localAngle = result.ang;
            localRow = result.row;
            broadcastLocal();
        }

        let displayedSeg = null;

        if (isMobile) {
            function onTouchStart(e) {
                e.preventDefault();
                isDragging = true;
                handle.classList.add('dragging');
                if (e.touches[0]) updateFromPoint(e.touches[0].clientX, e.touches[0].clientY);
            }
            function onTouchMove(e) {
                if (!isDragging) return;
                e.preventDefault();
                if (e.touches[0]) updateFromPoint(e.touches[0].clientX, e.touches[0].clientY);
            }
            function onTouchEnd(e) {
                if (!isDragging) return;
                isDragging = false;
                handle.classList.remove('dragging');
                if (displayedSeg && !displayedSeg.isGap) typeLabel(displayedSeg.label);
            }
            svg.addEventListener('touchstart', onTouchStart, { passive: false });
            window.addEventListener('touchmove', onTouchMove, { passive: false });
            window.addEventListener('touchend', onTouchEnd);
        } else {
            window.addEventListener('mousemove', (e) => {
                updateFromPoint(e.clientX, e.clientY);
            });
            window.addEventListener('mousedown', (e) => {
                updateFromPoint(e.clientX, e.clientY);
                if (displayedSeg && !displayedSeg.isGap) typeLabel(displayedSeg.label);
            });
        }

        // ===== Typing =====
        function typeLabel(label) {
            if (label === 'SEND') {
                if (sharedText.trim().length > 0) {
                    historyRef.push(sharedText);
                    textRef.set("");
                }
            } else if (label === 'DEL') {
                textRef.set(sharedText.slice(0, -1));
            } else if (label === 'SPACE') {
                textRef.set((sharedText + ' ').slice(-24));
            } else {
                textRef.set((sharedText + label).slice(-24));
            }
        }

        // ===== SMOOTH ANIMATION =====
        let displayAngle = localAngle;
        let displayRow = localRow;

        function setHandleVisual(angle, rowF) {
            const tipLen = TIP_LEN_OUTER + (TIP_LEN_INNER - TIP_LEN_OUTER) * rowF;
            const handleCenter = polar(PIVOT.x, PIVOT.y, HANDLE_ORBIT, angle);
            const tipEnd = polar(PIVOT.x, PIVOT.y, HANDLE_ORBIT + tipLen, angle);
            bodyEl.setAttribute('cx', handleCenter.x);
            bodyEl.setAttribute('cy', handleCenter.y);
            tipLine.setAttribute('x1', handleCenter.x);
            tipLine.setAttribute('y1', handleCenter.y);
            tipLine.setAttribute('x2', tipEnd.x);
            tipLine.setAttribute('y2', tipEnd.y);
            tipDot.setAttribute('cx', tipEnd.x);
            tipDot.setAttribute('cy', tipEnd.y);
            if (dragKnob) {
                const mid = polar(PIVOT.x, PIVOT.y, HANDLE_ORBIT + tipLen * 0.5, angle);
                dragKnob.setAttribute('cx', mid.x);
                dragKnob.setAttribute('cy', mid.y);
                dragKnobLabel.setAttribute('x', mid.x);
                dragKnobLabel.setAttribute('y', mid.y);
            }
        }

        function renderHighlight(angle, row) {
            const hit = getHighlightedSegment(angle, row);
            svg.querySelectorAll('.arc-letter').forEach(t => {
                t.classList.toggle('highlighted', hit && parseInt(t.dataset.idx) === hit.idx);
            });
            return hit;
        }

        function animate() {
            const now = Date.now();
            const activePlayers = Object.keys(allPlayers)
                .map(id => ({ id, ...allPlayers[id] }))
                .filter(p => p && typeof p.ang === 'number' && now - p.lastSeen < 10000)
                .sort((a, b) => a.joinedAt - b.joinedAt);

            tallyEl.innerText = activePlayers.length;

            let targetAngle = localAngle;
            let targetRow = localRow;

            if (activePlayers.length > 1) {
                const CYCLE_MS = 6660;
                const count = activePlayers.length;
                const t = (now % CYCLE_MS) / CYCLE_MS;
                const phase = t * count;

                const sigma = 0.35;
                let sumAng = 0, sumRow = 0, sumW = 0;
                for (let i = 0; i < count; i++) {
                    let dist = Math.abs(i - phase);
                    if (dist > count / 2) dist = count - dist;
                    const w = Math.exp(-(dist * dist) / (2 * sigma * sigma));
                    sumAng += activePlayers[i].ang * w;
                    sumRow += activePlayers[i].row * w;
                    sumW += w;
                }
                targetAngle = sumAng / sumW;
                targetRow = sumRow / sumW;
            } else if (activePlayers.length === 1) {
                targetAngle = activePlayers[0].ang;
                targetRow = activePlayers[0].row;
            }

            const ease = 0.08;
            displayAngle += (targetAngle - displayAngle) * ease;
            displayRow += (targetRow - displayRow) * ease;

            setHandleVisual(displayAngle, displayRow);
            const snapRow = displayRow < 0.5 ? 0 : 1;
            displayedSeg = renderHighlight(displayAngle, snapRow);

            requestAnimationFrame(animate);
        }

        // Init
        setHandleVisual(localAngle, localRow);
        broadcastLocal();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
