<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>weja</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff; --text: #333; --border: #eeeeee;
            --status-red: #ff5f57; --status-green: #28c840;
            --highlight: #ff3b30;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            margin: 0; padding: 20px; font-family: 'Roboto', sans-serif;
            background: var(--bg); color: var(--text); display: flex;
            flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden; touch-action: none;
        }

        #status-bar { position: fixed; top: 15px; left: 15px; display: flex; gap: 6px; z-index: 100; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #eee; }

        #container { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; margin-top: 20px; }

        #history {
            width: 100%; height: 100px; display: flex; flex-direction: column;
            justify-content: flex-end; margin-bottom: 5px;
            mask-image: linear-gradient(to top, black 70%, transparent 100%);
        }
        .msg { color: #bbb; font-size: 1.2rem; font-weight: 300; text-align: center; margin: 2px 0; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #display {
            width: 100%; min-height: 60px; padding: 10px; font-size: 1.8rem; font-weight: 300;
            border: 1px solid #ddd; border-radius: 15px; text-align: center; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: center; background: white; margin-bottom: 20px;
        }

        #compass-stage {
            width: 100%; max-width: 600px; flex: 1;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        #compass-svg { width: 100%; height: auto; display: block; user-select: none; touch-action: none; }

        .arc-letter {
            font-family: 'Roboto', sans-serif; font-weight: 300; font-size: 18px;
            fill: #555; user-select: none;
            transition: font-size 0.2s ease, font-weight 0.2s ease, fill 0.2s ease;
        }
        .arc-letter.special { fill: #aaa; font-size: 11px; letter-spacing: 1px; }
        /* STAGE 1 CHANGE: 3x size + bold on highlight */
        .arc-letter.highlighted { fill: var(--highlight); font-weight: 700; font-size: 54px; }
        .arc-letter.special.highlighted { fill: var(--highlight); font-weight: 700; font-size: 33px; }
        .arc-divider { stroke: var(--border); stroke-width: 1; fill: none; }
        .arc-bg { fill: rgba(255,255,255,0.4); stroke: var(--border); stroke-width: 1; }

        #compass-handle { cursor: grab; }
        #compass-handle.dragging { cursor: grabbing; }
        #compass-handle .body { fill: rgba(255,255,255,0.95); stroke: #222; stroke-width: 1.5; }
        #compass-handle .tip-line { stroke: #222; stroke-width: 1.5; fill: none; }

        #tally { margin-top: 20px; font-weight: 100; font-size: 1.2rem; color: #eee; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="status-bar">
        <div id="dot-net" class="dot"></div>
        <div id="dot-local" class="dot"></div>
    </div>

    <div id="container">
        <div id="history"></div>
        <div id="display"></div>
    </div>

    <div id="compass-stage">
        <svg id="compass-svg" viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div id="tally">0</div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // ===== Firebase =====
        const firebaseConfig = {
          apiKey: "AIzaSyDefyd7IEcb08AEVU1x3yi_U7H1BwVC_sg",
          authDomain: "wejaaaaaa.firebaseapp.com",
          databaseURL: "https://wejaaaaaa-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "wejaaaaaa",
          storageBucket: "wejaaaaaa.firebasestorage.app",
          messagingSenderId: "806504806929",
          appId: "1:806504806929:web:0d44b73feb96fc66ce0fb0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = Math.random().toString(36).substr(2, 9);
        const joinedAt = Date.now();
        const playerRef = db.ref('players/' + myId);
        const textRef = db.ref('sharedText');
        const playersRef = db.ref('players');
        const historyRef = db.ref('history');

        const display = document.getElementById('display');
        const historyEl = document.getElementById('history');
        const tallyEl = document.getElementById('tally');
        const dotNet = document.getElementById('dot-net');
        const dotLocal = document.getElementById('dot-local');
        const svg = document.getElementById('compass-svg');

        let allPlayers = {};
        let sharedText = "";

        db.ref(".info/connected").on("value", (snap) => {
            dotNet.style.background = snap.val() ? 'var(--status-green)' : 'var(--status-red)';
        });

        function prune() {
            const cutoff = Date.now() - 3600000;
            playersRef.once('value', (snap) => {
                snap.forEach(child => {
                    const p = child.val();
                    if (!p || !p.lastSeen || p.lastSeen < cutoff) {
                        child.ref.remove();
                    }
                });
            });
        }
        prune();
        setInterval(prune, 300000);
        playerRef.onDisconnect().remove();

        textRef.on('value', (snap) => { sharedText = snap.val() || ""; display.innerText = sharedText; });
        historyRef.limitToLast(10).on('value', (snap) => {
            historyEl.innerHTML = "";
            snap.forEach((child) => {
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerText = child.val();
                historyEl.appendChild(div);
            });
        });
        playersRef.on('value', (snap) => { allPlayers = snap.val() || {}; });

        // ===== Compass geometry =====
        const VB_W = 820, VB_H = 480;
        const PIVOT = { x: 410, y: 440 };

        const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        const ROW1 = ['A','B','C','D','E','F','G','H','I','J','K','L','DEL'];
        const ROW2 = [];
        const N_Z = 'NOPQRSTUVWXYZ'.split('');
        N_Z.forEach((l, i) => {
            ROW2.push(l);
            if (i < N_Z.length - 1) ROW2.push('__GAP__');
        });
        ROW2.push('SEND', 'SPACE');

        const ANG_START = -160;
        const ANG_END   = -20;
        const ANG_SPAN  = ANG_END - ANG_START;

        const R_OUTER_OUT = 380;
        const R_OUTER_IN  = 320;
        const R_INNER_OUT = 310;
        const R_INNER_IN  = 250;

        function deg2rad(d) { return d * Math.PI / 180; }
        function polar(cx, cy, r, deg) {
            const a = deg2rad(deg);
            return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
        }
        function arcPath(cx, cy, rOut, rIn, a0, a1) {
            const p0 = polar(cx, cy, rOut, a0);
            const p1 = polar(cx, cy, rOut, a1);
            const p2 = polar(cx, cy, rIn,  a1);
            const p3 = polar(cx, cy, rIn,  a0);
            const large = Math.abs(a1 - a0) > 180 ? 1 : 0;
            return `M ${p0.x} ${p0.y} A ${rOut} ${rOut} 0 ${large} 1 ${p1.x} ${p1.y} L ${p2.x} ${p2.y} A ${rIn} ${rIn} 0 ${large} 0 ${p3.x} ${p3.y} Z`;
        }

        const segments = [];
        const typeable = [];

        function buildRow(items, rOut, rIn, row) {
            const n = items.length;
            const step = ANG_SPAN / n;
            const labelR = (rOut + rIn) / 2;
            items.forEach((label, i) => {
                const a0 = ANG_START + i * step;
                const a1 = a0 + step;
                const mid = (a0 + a1) / 2;
                const isGap = label === '__GAP__';
                const seg = { label, row, a0, a1, mid, rOut, rIn, isGap };
                if (!isGap) {
                    seg.idx = typeable.length;
                    typeable.push(seg);
                }
                segments.push(seg);

                if (isGap) return;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', arcPath(PIVOT.x, PIVOT.y, rOut, rIn, a0, a1));
                path.setAttribute('class', 'arc-bg');
                path.dataset.label = label;
                svg.appendChild(path);

                const pos = polar(PIVOT.x, PIVOT.y, labelR, mid);
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', pos.x);
                text.setAttribute('y', pos.y);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');
                const rot = mid + 90;
                text.setAttribute('transform', `rotate(${rot} ${pos.x} ${pos.y})`);
                text.setAttribute('class', 'arc-letter' + ((label === 'DEL' || label === 'SEND' || label === 'SPACE') ? ' special' : ''));
                text.textContent = label === 'SPACE' ? '␣' : label;
                text.dataset.label = label;
                text.dataset.idx = seg.idx;
                svg.appendChild(text);
            });
        }

        buildRow(ROW1, R_OUTER_OUT, R_OUTER_IN, 0);
        buildRow(ROW2, R_INNER_OUT, R_INNER_IN, 1);

        // Compass handle
        const HANDLE_R = 22;
        const HANDLE_ORBIT = 90;
        const TIP_LEN_OUTER = R_OUTER_IN - HANDLE_ORBIT - 6;
        const TIP_LEN_INNER = R_INNER_IN - HANDLE_ORBIT - 6;

        const handle = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        handle.id = 'compass-handle';
        const body = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        body.setAttribute('r', HANDLE_R);
        body.setAttribute('class', 'body');
        const tipLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        tipLine.setAttribute('x1', 0); tipLine.setAttribute('y1', 0);
        tipLine.setAttribute('class', 'tip-line');
        const tipDot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        tipDot.setAttribute('r', 3.5);
        tipDot.setAttribute('fill', '#222');
        handle.appendChild(tipLine);
        handle.appendChild(body);
        handle.appendChild(tipDot);

        let dragKnob = null, dragKnobLabel = null;
        const KNOB_R = 34;
        if (isMobile) {
            dragKnob = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            dragKnob.setAttribute('r', KNOB_R);
            dragKnob.setAttribute('fill', '#111');
            dragKnob.setAttribute('stroke', '#000');
            dragKnob.setAttribute('stroke-width', '1');
            handle.appendChild(dragKnob);
            dragKnobLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            dragKnobLabel.setAttribute('fill', '#fff');
            dragKnobLabel.setAttribute('font-size', '10');
            dragKnobLabel.setAttribute('font-weight', '400');
            dragKnobLabel.setAttribute('letter-spacing', '1.5');
            dragKnobLabel.setAttribute('text-anchor', 'middle');
            dragKnobLabel.setAttribute('dominant-baseline', 'middle');
            dragKnobLabel.textContent = 'DRAG ME';
            handle.appendChild(dragKnobLabel);
        }

        svg.appendChild(handle);

        // ===== State =====
        let localAngle = (ANG_START + ANG_END) / 2;
        let localRow = 0;
        let isDragging = false;

        function setHandleVisual(angle, row) {
            const tipLen = row === 0 ? TIP_LEN_OUTER : TIP_LEN_INNER;
            const handleCenter = polar(PIVOT.x, PIVOT.y, HANDLE_ORBIT, angle);
            const tipEnd = polar(PIVOT.x, PIVOT.y, HANDLE_ORBIT + tipLen, angle);
            body.setAttribute('cx', handleCenter.x);
            body.setAttribute('cy', handleCenter.y);
            tipLine.setAttribute('x1', handleCenter.x);
            tipLine.setAttribute('y1', handleCenter.y);
            tipLine.setAttribute('x2', tipEnd.x);
            tipLine.setAttribute('y2', tipEnd.y);
            tipDot.setAttribute('cx', tipEnd.x);
            tipDot.setAttribute('cy', tipEnd.y);
            if (dragKnob) {
                const mid = polar(PIVOT.x, PIVOT.y, HANDLE_ORBIT + tipLen * 0.5, angle);
                dragKnob.setAttribute('cx', mid.x);
                dragKnob.setAttribute('cy', mid.y);
                dragKnobLabel.setAttribute('x', mid.x);
                dragKnobLabel.setAttribute('y', mid.y);
            }
        }

        function getHighlightedSegment(angle, row) {
            const clamped = Math.max(ANG_START, Math.min(ANG_END, angle));
            for (const s of segments) {
                if (s.row === row && !s.isGap && clamped >= s.a0 && clamped <= s.a1) return s;
            }
            return null;
        }

        function renderHighlight(angle, row) {
            const hit = getHighlightedSegment(angle, row);
            svg.querySelectorAll('.arc-letter').forEach(t => {
                t.classList.toggle('highlighted', hit && t.dataset.label === hit.label);
            });
            return hit;
        }

        // ===== Pointer -> angle/row =====
        function clientToSvg(clientX, clientY) {
            const pt = svg.createSVGPoint();
            pt.x = clientX; pt.y = clientY;
            return pt.matrixTransform(svg.getScreenCTM().inverse());
        }

        function pointToAngleRow(svgX, svgY) {
            const dx = svgX - PIVOT.x;
            const dy = svgY - PIVOT.y;
            const dist = Math.hypot(dx, dy);
            let ang = Math.atan2(dy, dx) * 180 / Math.PI;
            ang = Math.max(ANG_START, Math.min(ANG_END, ang));
            const rowBoundary = (R_OUTER_IN + R_INNER_OUT) / 2;
            let row = dist >= rowBoundary ? 0 : 1;
            if (row === 1) {
                const seg = segments.find(s => s.row === 1 && ang >= s.a0 && ang <= s.a1);
                if (seg && seg.isGap) row = 0;
            }
            return { ang, row, dist };
        }

        // ===== Broadcast: typeable index =====
        let localIdx = Math.floor(typeable.length / 2);
        function broadcastLocal() {
            playerRef.set({
                idx: localIdx,
                lastSeen: Date.now(),
                joinedAt: joinedAt
            });
            dotLocal.style.background = 'var(--status-green)';
        }

        // ===== Input: updates localIdx from pointer position =====
        function updateFromPoint(clientX, clientY) {
            const p = clientToSvg(clientX, clientY);
            const { ang, row } = pointToAngleRow(p.x, p.y);
            const seg = getHighlightedSegment(ang, row);
            if (seg) {
                localIdx = seg.idx;
                broadcastLocal();
            }
        }

        if (isMobile) {
            function onTouchStart(e) {
                e.preventDefault();
                isDragging = true;
                handle.classList.add('dragging');
                if (e.touches[0]) updateFromPoint(e.touches[0].clientX, e.touches[0].clientY);
            }
            function onTouchMove(e) {
                if (!isDragging) return;
                e.preventDefault();
                if (e.touches[0]) updateFromPoint(e.touches[0].clientX, e.touches[0].clientY);
            }
            function onTouchEnd(e) {
                if (!isDragging) return;
                isDragging = false;
                handle.classList.remove('dragging');
                // STAGE 2 will handle typing on lift — for now just stop dragging
                if (displayedSeg && !displayedSeg.isGap) typeLabel(displayedSeg.label);
            }
            svg.addEventListener('touchstart', onTouchStart, { passive: false });
            window.addEventListener('touchmove', onTouchMove, { passive: false });
            window.addEventListener('touchend', onTouchEnd);
        } else {
            window.addEventListener('mousemove', (e) => {
                updateFromPoint(e.clientX, e.clientY);
            });
            window.addEventListener('mousedown', (e) => {
                updateFromPoint(e.clientX, e.clientY);
                if (displayedSeg && !displayedSeg.isGap) typeLabel(displayedSeg.label);
            });
        }

        // ===== Typing =====
        function typeLabel(label) {
            if (label === 'SEND') {
                if (sharedText.trim().length > 0) {
                    historyRef.push(sharedText);
                    textRef.set("");
                }
            } else if (label === 'DEL') {
                textRef.set(sharedText.slice(0, -1));
            } else if (label === 'SPACE') {
                textRef.set((sharedText + ' ').slice(-24));
            } else {
                textRef.set((sharedText + label).slice(-24));
            }
        }

        // ===== STAGE 1: Smooth sine-wave animation =====
        // The needle sweeps between players on a 6.66s cycle.
        // Each player broadcasts their typeable index (0..N).
        // The sine wave visits each player's index in order, dwelling on each.
        // All clients use the same epoch-based timer so they stay in sync.

        let displayedIdxF = localIdx;
        let displayedSeg = typeable[localIdx];

        function renderHighlightByIdx(idx) {
            svg.querySelectorAll('.arc-letter').forEach(t => {
                const isMatch = parseInt(t.dataset.idx) === idx;
                t.classList.toggle('highlighted', isMatch);
            });
        }

        function animate() {
            const now = Date.now();
            const activePlayers = Object.keys(allPlayers)
                .map(id => ({ id, ...allPlayers[id] }))
                .filter(p => p && typeof p.idx === 'number' && now - p.lastSeen < 10000)
                .sort((a, b) => a.joinedAt - b.joinedAt);

            tallyEl.innerText = activePlayers.length;

            let targetIdxF = localIdx;

            if (activePlayers.length > 1) {
                // STAGE 1 KEY CHANGE: Sine-wave oscillation visiting each player.
                // 6.66 seconds per full cycle. Use epoch time so all clients sync.
                const CYCLE_MS = 6660;
                const count = activePlayers.length;

                // t goes 0→1 over one cycle, synced to epoch
                const t = (now % CYCLE_MS) / CYCLE_MS;

                // Sine wave: smoothly oscillates 0→1→0 but we want to visit
                // each player in sequence. Map t to a player index with sine easing.
                // Use a sine that sweeps through players: player focus = sin-eased ramp
                const phase = t * count; // which player we're near (fractional)

                // Sine-eased version: slows down at each player, speeds between them
                // f(t) = t - (1/(2π)) * sin(2πt)  — this is the original formula but
                // let's use a simpler pure sine blend for smoother dwelling
                const playerFocus = phase; // linear sweep through players

                // Weighted blend: Gaussian around the current focus player
                // This makes the needle dwell near each player's letter
                const sigma = 0.35; // controls dwell width
                let sumIdx = 0, sumW = 0;
                for (let i = 0; i < count; i++) {
                    // Distance on a circular arrangement of players
                    let dist = Math.abs(i - playerFocus);
                    if (dist > count / 2) dist = count - dist;

                    const w = Math.exp(-(dist * dist) / (2 * sigma * sigma));
                    sumIdx += activePlayers[i].idx * w;
                    sumW += w;
                }
                targetIdxF = sumIdx / sumW;
            } else if (activePlayers.length === 1) {
                targetIdxF = activePlayers[0].idx;
            }

            // Smooth easing toward target — never snaps
            // Use a tighter easing factor for silk-smooth movement
            const easeFactor = 0.08;
            displayedIdxF += (targetIdxF - displayedIdxF) * easeFactor;

            // Interpolate angle+row between adjacent typeable segments
            const lo = Math.max(0, Math.min(typeable.length - 1, Math.floor(displayedIdxF)));
            const hi = Math.max(0, Math.min(typeable.length - 1, Math.ceil(displayedIdxF)));
            const f = displayedIdxF - lo;
            const segA = typeable[lo], segB = typeable[hi];
            const ang = segA.mid + (segB.mid - segA.mid) * f;
            const rowF = segA.row + (segB.row - segA.row) * f;
            setHandleVisualSmooth(ang, rowF);

            // Nearest typeable = what's highlighted for typing
            const nearest = Math.round(displayedIdxF);
            const clampedNearest = Math.max(0, Math.min(typeable.length - 1, nearest));
            displayedSeg = typeable[clampedNearest];
            renderHighlightByIdx(clampedNearest);

            requestAnimationFrame(animate);
        }

        function setHandleVisualSmooth(angle, rowF) {
            const tipLen = TIP_LEN_OUTER + (TIP_LEN_INNER - TIP_LEN_OUTER) * rowF;
            const handleCenter = polar(PIVOT.x, PIVOT.y, HANDLE_ORBIT, angle);
            const tipEnd = polar(PIVOT.x, PIVOT.y, HANDLE_ORBIT + tipLen, angle);
            body.setAttribute('cx', handleCenter.x);
            body.setAttribute('cy', handleCenter.y);
            tipLine.setAttribute('x1', handleCenter.x);
            tipLine.setAttribute('y1', handleCenter.y);
            tipLine.setAttribute('x2', tipEnd.x);
            tipLine.setAttribute('y2', tipEnd.y);
            tipDot.setAttribute('cx', tipEnd.x);
            tipDot.setAttribute('cy', tipEnd.y);
            if (dragKnob) {
                const mid = polar(PIVOT.x, PIVOT.y, HANDLE_ORBIT + tipLen * 0.5, angle);
                dragKnob.setAttribute('cx', mid.x);
                dragKnob.setAttribute('cy', mid.y);
                dragKnobLabel.setAttribute('x', mid.x);
                dragKnobLabel.setAttribute('y', mid.y);
            }
        }

        // Initial render
        const initSeg = typeable[localIdx];
        setHandleVisualSmooth(initSeg.mid, initSeg.row);
        renderHighlightByIdx(localIdx);
        broadcastLocal();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
