<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>weja</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #ffffff; --text: #333; --border: #eeeeee; 
            --ghost: rgba(0, 0, 0, 0.15); --status-red: #ff5f57; --status-green: #28c840; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 20px; font-family: 'Roboto', sans-serif; 
            background: var(--bg); color: var(--text); display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; touch-action: none; 
        }
        
        #status-bar { position: fixed; top: 15px; left: 15px; display: flex; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #eee; }

        #container { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; }

        #history {
            width: 100%; height: 100px; display: flex; flex-direction: column;
            justify-content: flex-end; margin-bottom: 5px;
            mask-image: linear-gradient(to top, black 70%, transparent 100%);
        }
        .msg { color: #aaa; font-size: 1.2rem; font-weight: 300; text-align: center; margin: 2px 0; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #display { 
            width: 100%; min-height: 60px; padding: 10px; font-size: 1.8rem; font-weight: 300; 
            border: 1px solid #ddd; border-radius: 15px; text-align: center; letter-spacing: 1px; 
            display: flex; align-items: center; justify-content: center; background: white; margin-bottom: 20px;
        }

        #keyboard { display: grid; grid-template-columns: repeat(20, 1fr); gap: 6px; width: 100%; max-width: 800px; user-select: none; }
        .key { grid-column: span 2; height: 45px; display: flex; align-items: center; justify-content: center; background: #fff; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; cursor: pointer; }
        .key.wide { grid-column: span 12; }
        .key.gray { grid-column: span 3; background: #fcfcfc; color: #999; font-size: 0.75rem; letter-spacing: 1px; }
        .spacer { grid-column: span 1; }

        #mobile-controls {
            display: none; /* Shown via JS if mobile */
            width: 100%; max-width: 400px; margin-top: 20px; flex-direction: column; gap: 10px;
        }
        #trackpad {
            width: 100%; height: 140px; background: #f9f9f9; border: 1px solid #eee; border-radius: 20px;
            display: flex; align-items: center; justify-content: center; padding: 30px;
            text-align: center; color: #bbb; font-size: 0.8rem; font-weight: 300; line-height: 1.4;
        }
        #transmit {
            width: 100%; height: 60px; background: #333; color: white; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; letter-spacing: 2px; font-weight: 300; cursor: pointer;
        }

        #tally { margin-top: 30px; font-weight: 100; font-size: 1.2rem; color: #ddd; letter-spacing: 2px; }
        #ghost-cursor { position: fixed; left: 50%; top: 50%; width: 30px; height: 30px; background: var(--ghost); border: 1px solid #000; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 9999; }
    </style>
</head>
<body>

    <div id="status-bar">
        <div id="dot-net" class="dot"></div>
        <div id="dot-local" class="dot"></div>
    </div>

    <div id="container">
        <div id="history"></div>
        <div id="display"></div>
    </div>

    <div id="keyboard">
        <div class="key">1</div><div class="key">2</div><div class="key">3</div><div class="key">4</div><div class="key">5</div><div class="key">6</div><div class="key">7</div><div class="key">8</div><div class="key">9</div><div class="key">0</div>
        <div class="key">Q</div><div class="key">W</div><div class="key">E</div><div class="key">R</div><div class="key">T</div><div class="key">Y</div><div class="key">U</div><div class="key">I</div><div class="key">O</div><div class="key">P</div>
        <div class="spacer"></div><div class="key">A</div><div class="key">S</div><div class="key">D</div><div class="key">F</div><div class="key">G</div><div class="key">H</div><div class="key">J</div><div class="key">K</div><div class="key">L</div><div class="spacer"></div>
        <div class="key gray">DEL</div><div class="key">Z</div><div class="key">X</div><div class="key">C</div><div class="key">V</div><div class="key">B</div><div class="key">N</div><div class="key">M</div><div class="key gray">SEND</div>
        <div class="spacer"></div><div class="spacer"></div><div class="spacer"></div><div class="key wide">SPACE</div>
    </div>

    <div id="mobile-controls">
        <div id="trackpad">Use two fingers:<br>One to guide the souls,<br>tap transmit to convey a glyph.</div>
        <div id="transmit">TRANSMIT</div>
    </div>

    <div id="tally">0</div>
    <div id="ghost-cursor"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDefyd7IEcb08AEVU1x3yi_U7H1BwVC_sg",
          authDomain: "wejaaaaaa.firebaseapp.com",
          databaseURL: "https://wejaaaaaa-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "wejaaaaaa",
          storageBucket: "wejaaaaaa.firebasestorage.app",
          messagingSenderId: "806504806929",
          appId: "1:806504806929:web:0d44b73feb96fc66ce0fb0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = Math.random().toString(36).substr(2, 9);
        const joinedAt = Date.now();
        
        const playerRef = db.ref('players/' + myId);
        const textRef = db.ref('sharedText');
        const playersRef = db.ref('players');
        const historyRef = db.ref('history');

        const display = document.getElementById('display');
        const historyEl = document.getElementById('history');
        const tallyEl = document.getElementById('tally');
        const ghost = document.getElementById('ghost-cursor');
        const dotNet = document.getElementById('dot-net');
        const dotLocal = document.getElementById('dot-local');
        const mobileControls = document.getElementById('mobile-controls');
        const trackpad = document.getElementById('trackpad');
        const transmitBtn = document.getElementById('transmit');

        let allPlayers = {};
        let sharedText = "";
        let isMobile = ('ontouchstart' in window);

        if (isMobile) mobileControls.style.display = 'flex';

        db.ref(".info/connected").on("value", (snap) => {
            dotNet.style.background = snap.val() ? 'var(--status-green)' : 'var(--status-red)';
        });
        playerRef.onDisconnect().remove();

        function sendPos(x, y) {
            playerRef.set({ x: x / window.innerWidth, y: y / window.innerHeight, lastSeen: Date.now(), joinedAt: joinedAt });
            dotLocal.style.background = 'var(--status-green)';
        }

        // DESKTOP POSITIONING
        window.addEventListener('mousemove', (e) => { if(!isMobile) sendPos(e.clientX, e.clientY); });

        // MOBILE POSITIONING (TRACKPAD)
        trackpad.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = trackpad.getBoundingClientRect();
            // Map trackpad internal coordinates to full-screen percentage
            const x = ((touch.clientX - rect.left) / rect.width) * window.innerWidth;
            const y = ((touch.clientY - rect.top) / rect.height) * window.innerHeight;
            sendPos(x, y);
        }, { passive: false });

        textRef.on('value', (snap) => { sharedText = snap.val() || ""; display.innerText = sharedText; });

        historyRef.limitToLast(10).on('value', (snap) => {
            historyEl.innerHTML = "";
            snap.forEach((child) => {
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerText = child.val();
                historyEl.appendChild(div);
            });
        });

        playersRef.on('value', (snap) => { allPlayers = snap.val() || {}; });

        function animate() {
            const now = Date.now();
            const activePlayers = Object.keys(allPlayers)
                .map(id => ({ id, ...allPlayers[id] }))
                .filter(p => now - p.lastSeen < 6000)
                .sort((a, b) => a.joinedAt - b.joinedAt);

            const count = activePlayers.length;
            tallyEl.innerText = count;

            if (count > 0) {
                const orbitTime = 5000; 
                const focus = ((now % orbitTime) / orbitTime) * count;
                let sumX = 0, sumY = 0, sumWeight = 0;

                activePlayers.forEach((p, i) => {
                    let dist = Math.abs(i - focus);
                    if (dist > count / 2) dist = Math.abs(dist - count);
                    const weight = Math.exp(-(dist * dist) / (2 * 0.4 * 0.4));
                    sumX += p.x * weight;
                    sumY += p.y * weight;
                    sumWeight += weight;
                });

                const targetX = (sumX / sumWeight) * window.innerWidth;
                const targetY = (sumY / sumWeight) * window.innerHeight;
                const currentX = parseFloat(ghost.style.left) || targetX;
                const currentY = parseFloat(ghost.style.top) || targetY;
                ghost.style.left = (currentX + (targetX - currentX) * 0.2) + 'px';
                ghost.style.top = (currentY + (targetY - currentY) * 0.2) + 'px';
            }
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        function tryType(e) {
            if(e) e.preventDefault();
            const rect = ghost.getBoundingClientRect();
            const el = document.elementFromPoint(rect.left + 15, rect.top + 15);
            
            if (el && el.classList.contains('key')) {
                let char = el.innerText;
                if (char === 'SEND') {
                    if (sharedText.trim().length > 0) {
                        historyRef.push(sharedText);
                        textRef.set("");
                        historyRef.once('value', s => {
                            if (s.numChildren() > 10) {
                                let c = 0;
                                s.forEach(child => { if (c++ < s.numChildren() - 10) child.ref.remove(); });
                            }
                        });
                    }
                } else if (char === 'DEL') {
                    textRef.set(sharedText.slice(0, -1));
                } else {
                    let nextText = sharedText;
                    if (char === 'SPACE') nextText += ' ';
                    else nextText += char;
                    textRef.set(nextText.slice(-24));
                }
            }
        }

        window.addEventListener('mousedown', (e) => { if(!isMobile) tryType(e); });
        transmitBtn.addEventListener('touchstart', (e) => { tryType(e); });
    </script>
</body>
</html>
