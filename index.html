<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>weja</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #333;
            --border: #eeeeee;
            --key-bg: #ffffff;
            --ghost: rgba(0, 0, 0, 0.15);
            --status-red: #ff5f57;
            --status-yellow: #febc2e;
            --status-green: #28c840;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* Status Dots */
        #status-bar {
            position: fixed;
            top: 15px;
            left: 15px;
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #eee;
            transition: background 0.3s ease;
        }

        #display-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }

        #display {
            width: 100%;
            min-height: 70px;
            padding: 15px;
            font-size: 2.2rem;
            font-weight: 300;
            border: 1px solid #ddd;
            border-radius: 15px;
            text-align: center;
            letter-spacing: 1px;
            word-wrap: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #keyboard {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 800px;
            user-select: none;
        }

        .key {
            grid-column: span 2;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--key-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 400;
            cursor: pointer;
        }

        .key.wide { grid-column: span 12; }
        .key.return { grid-column: span 4; }
        .spacer { grid-column: span 1; }

        #tally {
            margin-top: 60px;
            font-weight: 100;
            font-size: 1.5rem;
            color: #ddd;
            letter-spacing: 2px;
        }

        #ghost-cursor {
            position: fixed;
            left: 0;
            top: 0;
            width: 30px;
            height: 30px;
            background: var(--ghost);
            border: 1px solid #000;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            transition: transform 0.1s ease-out;
        }

        @media (max-width: 600px) {
            .key { height: 45px; font-size: 0.9rem; }
            #display { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div id="status-bar">
        <div id="dot-net" class="dot"></div>
        <div id="dot-local" class="dot"></div>
        <div id="dot-mesh" class="dot"></div>
    </div>

    <div id="display-container">
        <div id="display"></div>
    </div>

    <div id="keyboard">
        <div class="key">1</div><div class="key">2</div><div class="key">3</div><div class="key">4</div><div class="key">5</div>
        <div class="key">6</div><div class="key">7</div><div class="key">8</div><div class="key">9</div><div class="key">0</div>
        <div class="key">Q</div><div class="key">W</div><div class="key">E</div><div class="key">R</div><div class="key">T</div>
        <div class="key">Y</div><div class="key">U</div><div class="key">I</div><div class="key">O</div><div class="key">P</div>
        <div class="spacer"></div>
        <div class="key">A</div><div class="key">S</div><div class="key">D</div><div class="key">F</div><div class="key">G</div>
        <div class="key">H</div><div class="key">J</div><div class="key">K</div><div class="key">L</div>
        <div class="spacer"></div>
        <div class="spacer"></div><div class="spacer"></div>
        <div class="key">Z</div><div class="key">X</div><div class="key">C</div><div class="key">V</div><div class="key">B</div>
        <div class="key">N</div><div class="key">M</div>
        <div class="key return">RET</div>
        <div class="spacer"></div><div class="spacer"></div><div class="spacer"></div>
        <div class="key wide">SPACE</div>
    </div>

    <div id="tally">0</div>
    <div id="ghost-cursor"></div>

    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>

    <script>
        // 1. Setup & Status References
        const dotNet = document.getElementById('dot-net');
        const dotLocal = document.getElementById('dot-local');
        const dotMesh = document.getElementById('dot-mesh');
        
        dotNet.style.background = 'var(--status-yellow)';
        dotLocal.style.background = 'var(--status-red)';
        dotMesh.style.background = 'var(--status-yellow)';

        const gun = Gun([
            'https://gun-manhattan.herokuapp.com/gun',
            'https://gunjs.herokuapp.com/gun',
            'https://nw.gun.eco/gun'
        ]);

        const room = gun.get('weja_v3_core');
        const myId = Math.random().toString(36).substr(2, 9);
        const display = document.getElementById('display');
        const tally = document.getElementById('tally');
        const ghost = document.getElementById('ghost-cursor');
        
        let players = {};
        let sharedText = "";
        let lastLocalMove = 0;
        let seenOther = false;

        // 2. Network Status Listener
        gun.on('hi', () => { dotNet.style.background = 'var(--status-green)'; });
        gun.on('bye', () => { dotNet.style.background = 'var(--status-red)'; });

        // 3. Text Sync
        room.get('text').on((data) => {
            if (data !== undefined) {
                sharedText = data;
                display.innerText = data;
                dotMesh.style.background = 'var(--status-green)';
            }
        });

        // 4. Input Tracking
        const handleMove = (e) => {
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            if (clientX && clientY) {
                lastLocalMove = Date.now();
                dotLocal.style.background = 'var(--status-green)';
                room.get('players').get(myId).put({
                    x: clientX / window.innerWidth,
                    y: clientY / window.innerHeight,
                    ts: lastLocalMove
                });
            }
        };

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);

        // 5. Receive Mesh Data
        room.get('players').map().on((data, id) => {
            if (data) {
                players[id] = data;
                if (id !== myId) seenOther = true;
            }
        });

        // 6. Logic Engine
        setInterval(() => {
            const now = Date.now();
            let sumX = 0, sumY = 0, activeCount = 0;

            // Idle Check
            if (now - lastLocalMove > 10000) dotLocal.style.background = 'var(--status-yellow)';

            // Mesh Check
            if (seenOther) dotMesh.style.background = 'var(--status-green)';

            Object.keys(players).forEach(id => {
                const p = players[id];
                if (p && now - p.ts < 4000) {
                    sumX += p.x;
                    sumY += p.y;
                    activeCount++;
                } else {
                    delete players[id];
                }
            });

            if (activeCount > 0) {
                const avgX = (sumX / activeCount) * window.innerWidth;
                const avgY = (sumY / activeCount) * window.innerHeight;
                ghost.style.left = avgX + 'px';
                ghost.style.top = avgY + 'px';
                tally.innerText = activeCount;
            } else {
                tally.innerText = "0";
            }
        }, 40);

        // 7. Click Logic
        window.addEventListener('mousedown', () => {
            const rect = ghost.getBoundingClientRect();
            const el = document.elementFromPoint(rect.left + 15, rect.top + 15);
            
            if (el && el.classList.contains('key')) {
                let char = el.innerText;
                let nextText = sharedText;
                if (char === 'SPACE') nextText += ' ';
                else if (char === 'RET') nextText = "";
                else nextText += char;
                room.get('text').put(nextText.slice(-24));
            }
        });
    </script>
</body>
</html>
